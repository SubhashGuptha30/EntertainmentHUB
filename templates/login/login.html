<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" Content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Entertainment Hub</title>
  <link rel="stylesheet" href="/static/css/auth.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
  <div id="preloader">
    <div class="loader">
      <div class="inner"></div>
    </div>
  </div>

  <div id="main-content">
    <div class="auth-page">
      <div class="auth-box">
        <form id="loginForm">
          <h2>Login</h2>
          <div class="auth-input-group">
            <input type="text" placeholder="Username" required id="username" class="auth-input">
            <i class='bx bxs-user-circle'></i>
          </div>

          <div class="auth-input-group">
            <input type="password" placeholder="Password" required id="password" class="auth-input">
            <i class='bx bxs-lock-alt'></i>
          </div>

          <div
            style="display:flex; justify-content:space-between; margin-bottom: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            <label><input type="checkbox" style="margin-right: 5px;">Remember me</label>
            <a href="#" style="color: var(--primary);">Forgot password?</a>
          </div>

          <button type="submit" class="auth-btn" id="loginBtn">Login</button>

          <div class="auth-link">
            <p>Don't have an account? <a href="/login/register.html">REGISTER</a></p>
            <a href="/index.html" class="back-link"
              style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem; display: block;">
              <i class='bx bx-arrow-back'></i> Back to Home
            </a>
          </div>
        </form>
        <div id="message" style="margin-top: 1rem; min-height: 1.5rem;"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(function () {
        const preloader = document.getElementById("preloader");
        preloader.style.opacity = '0';
        setTimeout(() => { preloader.style.display = "none"; }, 500);
      }, 800);
    });

    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const messageDiv = document.getElementById('message');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        messageDiv.textContent = '';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();

          if (res.ok) {
            // Store minimal info in localStorage for UI display (session handled server-side)
            localStorage.setItem('signedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            messageDiv.textContent = 'Login successful!';
            messageDiv.style.color = 'var(--primary)';
            setTimeout(() => { window.location.href = '/login/success.html'; }, 800);
          } else {
            messageDiv.textContent = data.error || 'Login failed';
            messageDiv.style.color = '#ff4757';
            btn.disabled = false;
            btn.textContent = 'Login';
          }
        } catch (err) {
          messageDiv.textContent = 'Connection error. Is the server running?';
          messageDiv.style.color = '#ff4757';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      });
    });
  </script>
</body>

</html>
