<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Lost in Space | Entertainment Hub</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="shortcut icon" href="/static/images/logo.png" type="image/x-icon" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            overflow: hidden;
            font-family: var(--ff-poppins, 'Poppins', sans-serif);
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 180, 58, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(255, 180, 58, 0.05), transparent 25%);
        }
        
        #main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .not-found-container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 600px;
            background: rgba(11, 15, 25, 0.6);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary, #ffb43a), #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
            text-shadow: 0px 10px 30px rgba(255, 180, 58, 0.2);
        }

        .error-message {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .error-text {
            color: #aaa;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary, #ffb43a);
            color: #000;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 180, 58, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.95rem;
        }

        .home-btn:hover {
            transform: translateY(-4px);
            background: #fff;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        .home-btn i {
            font-size: 1.4rem;
        }

        /* Cinematic Particles Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 250px 250px;
            animation: starsAnimation 60s linear infinite;
            opacity: 0.6;
        }

        @keyframes starsAnimation {
            0% { transform: translateY(0); }
            100% { transform: translateY(-250px); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Glitch effect on hover for the 404 */
        .error-code:hover {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="main-content">
        <div class="not-found-container">
            <div class="error-code">404</div>
            <h1 class="error-message">This Page is Not in Our Script</h1>
            <p class="error-text">
                The content you are looking for has been deleted, moved, or never existed in our cinematic universe. Don't worry, the show must go on! 
            </p>
            <a href="/home" class="home-btn">
                <i class="bx bx-home-alt-2"></i>
                Return to Home Menu
            </a>
        </div>
    </div>
</body>
</html>
