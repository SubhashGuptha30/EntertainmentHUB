<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | ENTERTAINMENT HUB</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/contact.css" />
  <link rel="stylesheet" href="/static/css/swiper-bundle.min.css" />
  <link rel="shortcut icon" href="/static/images/logo.png" type="image/x-icon" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
  <div id="preloader">
    <div class="loader">
      <div class="inner"></div>
    </div>
  </div>

  <div id="main-content">
    <div id="global-header"></div>

    <div class="contact-page">
      <div class="contact-container">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
          <div class="contact-left-title">
            <h2>GET IN TOUCH</h2>
            <hr>
          </div>
          <input type="hidden" name="access_key" value="85a1b965-a925-4770-a2bc-1af158712dc1">
          <input type="text" name="name" placeholder="Your Name" class="contact-input" required>
          <input type="email" name="email" placeholder="Your Email" class="contact-input" required>
          <textarea name="message" placeholder="Your Message" class="contact-input" required></textarea>
          <button type="submit" class="contact-btn">Submit <i class='bx bx-send'></i></button>
        </form>
        <div class="contact-right">
          <img src="/static/images/contact.svg" alt="Contact Us">
        </div>
      </div>
    </div>

    <!--Footer-->
    <!--Footer-->
    <div id="global-footer"></div>
    <!--Footer-->
    <!--Footer-->
  </div>

  <script src="/static/js/main.js"></script>
</body>

</html>
