<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="stylesheet" href="/static/css/play.css" />
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="shortcut icon" href="/static/images/logo.png" type="image/x-icon" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
    <div id="preloader">
        <div class="loader">
            <div class="inner"></div>
        </div>
    </div>

    <div id="main-content" style="opacity: 0; transition: opacity 0.5s ease;">
        <div id="global-header"></div>

        <!-- Head -->
        <section class="play-container container head">
            <div class="play-img-container">
                <img src="" alt="Image" class="play-img" id="banner-image">
                <div class="play-info head-text">
                    <div class="play-text">
                        <h2 id="movie-title">Title</h2>
                        <div class="rating" id="movie-rating">
                            <!-- Stars injected here -->
                        </div><br>
                        <div class="tags" id="movie-tags">
                            <!-- Tags injected here -->
                        </div>
                    </div>
                    <!-- Play Button -->
                    <div class="play-buton">
                        <button class="play-button" id="play-btn-action">
                            <i class='bx bx-play'></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Video Overlay (Moved here to escape stacking context) -->
        <div class="video-overlay" id="video-overlay">
            <iframe id="video-iframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <!-- Information -->
        <section class="about-movie container">
            <div class="description">
                <h2 id="desc-title">Title</h2>
                <p id="movie-desc">Description loading...</p>
            </div>
            <div class="movie-details" id="details-section">
                <h2 class="details-heading">Details</h2>
                <div class="details-list">
                    <div class="detail-item">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" id="detail-status">—</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Rating</span>
                        <span class="detail-value" id="detail-rating">—</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Genre</span>
                        <span class="detail-value" id="detail-genre">—</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Category</span>
                        <span class="detail-value" id="detail-category">—</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Cast Section (Full Width Below Description) -->
        <section class="cast-section container" id="cast-section">
            <h2 class="cast-heading">Cast</h2>
            <div class="cast" id="cast-container">
                <!-- Cast members injected here -->
            </div>
        </section>

        <!-- Watch Options -->
        <section class="watch-here container">
            <h2 class="watch-title">Watch Options</h2>
            <div class="watch-links" id="watch-container">
                <!-- Watch links injected here -->
            </div>
        </section>

        <!-- Copyright -->
        <!--Footer-->
        <div id="global-footer"></div>
        <!--Footer-->
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Parse query params
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type') || 'movies';
            const slug = urlParams.get('slug');

            if (!slug) {
                window.location.href = '/home.html';
                return;
            }

            try {
                // Load all content from the Flask API
                const apiRes = await fetch('/api/content');
                if (!apiRes.ok) throw new Error('API error: ' + apiRes.status);
                const data = await apiRes.json();

                // Map URL type param to data keys
                const typeMap = {
                    'movies': 'movies',
                    'animes': 'animes',
                    'webSeries': 'webSeries',
                    'anime': 'animes',
                    'web-series': 'webSeries',
                    'series': 'webSeries'
                };

                const dataKey = typeMap[type] || type;

                let item = null;
                let foundCategory = dataKey;
                if (data[dataKey] && data[dataKey][slug]) {
                    item = data[dataKey][slug];
                } else {
                    // Fallback search across all categories if type not specified or wrong
                    for (const cat in data) {
                        if (data[cat][slug]) {
                            item = data[cat][slug];
                            foundCategory = cat;
                            break;
                        }
                    }
                }

                if (item) {
                    // Populate Content
                    document.title = `${item.title} | Entertainment Hub`;
                    document.getElementById('movie-title').textContent = item.title;
                    document.getElementById('desc-title').textContent = item.title;
                    document.getElementById('movie-desc').textContent = item.description || "No description available.";

                    // Image Fallback
                    const poster = item['h-image'] || item['v-image'] || '/images/default-poster.jpg';
                    const bannerImg = document.getElementById('banner-image');
                    bannerImg.src = poster;
                    // If it's an SVG placeholder, use contain mode instead of cover
                    if (poster.endsWith('.svg')) {
                        bannerImg.classList.add('placeholder-img');
                    } else {
                        bannerImg.classList.remove('placeholder-img');
                    }

                    // Rating
                    const ratingContainer = document.getElementById('movie-rating');
                    ratingContainer.innerHTML = '';
                    const stars = Math.round(item.rating || 4.5); // Default to 4.5
                    for (let i = 0; i < 5; i++) {
                        const icon = document.createElement('i');
                        icon.className = i < stars ? 'bx bxs-star' : 'bx bx-star';
                        ratingContainer.appendChild(icon);
                    }

                    // Tags
                    const tagsContainer = document.getElementById('movie-tags');
                    tagsContainer.innerHTML = '';
                    const tags = item.tags || [];
                    tags.forEach(tag => {
                        const span = document.createElement('span');
                        span.textContent = tag;
                        tagsContainer.appendChild(span);
                    });

                    // Video
                    const videoFrame = document.getElementById('video-iframe');
                    const videoOverlay = document.getElementById('video-overlay');
                    const playBtn = document.getElementById('play-btn-action');

                    // Reset initial state
                    playBtn.style.display = 'flex';
                    videoOverlay.style.display = 'none';

                    if (item.videoUrl) {
                        videoFrame.src = item.videoUrl;

                        const openVideo = () => {
                            videoOverlay.style.display = 'flex';
                            if (item.videoUrl.includes('youtube')) {
                                videoFrame.src += "&autoplay=1";
                            }
                        };

                        playBtn.removeEventListener('click', openVideo);
                        playBtn.addEventListener('click', openVideo);

                        // Overlay close
                        videoOverlay.onclick = (e) => {
                            if (e.target === videoOverlay) {
                                videoOverlay.style.display = 'none';
                                const tempSrc = videoFrame.src;
                                videoFrame.src = "";
                                videoFrame.src = tempSrc.replace("&autoplay=1", "");
                            }
                        };
                    } else {
                        playBtn.style.display = 'none';
                    }

                    // Details (Right Pane)
                    document.getElementById('detail-status').textContent = item.Status || 'Released';
                    document.getElementById('detail-rating').textContent = item.rating || 'PG-13';
                    document.getElementById('detail-genre').textContent = (item.tags || []).join(', ') || '—';
                    const categoryLabels = { movies: 'Movie', animes: 'Anime', webSeries: 'Web Series' };
                    document.getElementById('detail-category').textContent = categoryLabels[foundCategory] || 'Movie';

                    // Cast
                    const castContainer = document.getElementById('cast-container');
                    castContainer.innerHTML = '';
                    const cast = item.cast || [];
                    if (cast.length === 0) {
                        document.getElementById('cast-section').style.display = 'none';
                    } else {
                        cast.forEach(member => {
                            const box = document.createElement('div');
                            box.className = 'cast-box';
                            box.innerHTML = `
                                <img src="${member.image}" alt="${member.name}" class="cast-img" onerror="this.src='/images/user.png'">
                                <div class="cast-info">
                                    <span class="cast-title">${member.name}</span>
                                    <div class="character-box">${member.role}</div>
                                </div>
                            `;
                            castContainer.appendChild(box);
                        });
                    }

                    // Watch Options
                    const watchContainer = document.getElementById('watch-container');
                    watchContainer.innerHTML = '';
                    const watchOptions = item.watchOptions || [];
                    watchOptions.forEach(opt => {
                        const optLink = document.createElement('a');
                        optLink.className = 'watch-link';
                        let iconName = opt.toLowerCase().replace(/\s+/g, '');
                        optLink.href = `/redirect.html?platform=${encodeURIComponent(opt)}&title=${encodeURIComponent(item.title)}&icon=${encodeURIComponent(iconName)}`;

                        optLink.innerHTML = `
                            <img src="/static/images/watch/${iconName}.png" alt="${opt}" onerror="this.src='/images/logo.png'">
                            <span class="watch-name">${opt}</span>
                        `;
                        watchContainer.appendChild(optLink);
                    });

                    // Show Main Content
                    document.getElementById('main-content').style.opacity = '1';

                } else {
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50px;'>Content Not Found</h1>";
                }

            } catch (err) {
                console.error("Error loading content:", err);
            }
        });
    </script>
</body>

</html>
