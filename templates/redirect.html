<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting... | Entertainment Hub</title>
    <meta name="description" content="Redirecting you to your streaming platform">
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f0f11;
            color: #fff;
            font-family: 'Outfit', 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 180, 58, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255, 94, 58, 0.06) 0%, transparent 50%);
            animation: bgFloat 10s ease-in-out infinite alternate;
        }

        @keyframes bgFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-30px, 20px) rotate(3deg);
            }
        }

        /* Main Card */
        .redirect-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 3.5rem 3rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            animation: cardEntry 0.6s ease-out;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Platform Icon */
        .platform-icon-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconBounce 1s ease-out 0.3s both;
            position: relative;
            overflow: hidden;
        }

        .platform-icon-wrapper::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 24px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(255, 180, 58, 0.4), transparent, rgba(255, 94, 58, 0.3)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        @keyframes iconBounce {
            0% {
                transform: scale(0);
            }

            60% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .platform-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        /* Title / Text */
        .redirect-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: #fff;
        }

        .redirect-subtitle {
            font-size: 1rem;
            color: #999;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .movie-name {
            color: var(--primary, #FFB43A);
            font-weight: 600;
        }

        .platform-name {
            color: #fff;
            font-weight: 600;
        }

        /* Loading Animation */
        .loading-section {
            margin: 2rem 0;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .loading-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary, #FFB43A);
            animation: dotPulse 1.4s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {

            0%,
            80%,
            100% {
                transform: scale(0.4);
                opacity: 0.3;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Progress Bar */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.8rem;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFB43A, #FF7043);
            border-radius: 10px;
            animation: progressGrow 4s ease-in-out forwards;
        }

        @keyframes progressGrow {
            0% {
                width: 0%;
            }

            30% {
                width: 40%;
            }

            60% {
                width: 70%;
            }

            90% {
                width: 90%;
            }

            100% {
                width: 100%;
            }
        }

        .progress-text {
            font-size: 0.8rem;
            color: #666;
        }

        /* Notice Box */
        .notice-box {
            background: rgba(255, 180, 58, 0.06);
            border: 1px solid rgba(255, 180, 58, 0.15);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            text-align: left;
        }

        .notice-box i {
            font-size: 1.3rem;
            color: var(--primary, #FFB43A);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .notice-box p {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.5;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.8rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            text-decoration: none;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-back i {
            font-size: 1.1rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: linear-gradient(135deg, #FFB43A, #FF7043);
            color: #000;
            text-decoration: none;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 180, 58, 0.3);
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            background: var(--primary, #FFB43A);
            opacity: 0.15;
            animation: float linear infinite;
            z-index: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .redirect-card {
                padding: 2.5rem 1.8rem;
                border-radius: 24px;
            }

            .redirect-title {
                font-size: 1.3rem;
            }

            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Background Glow -->
    <div class="bg-glow"></div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Main Redirect Card -->
    <div class="redirect-card">
        <!-- Platform Icon -->
        <div class="platform-icon-wrapper">
            <img id="platform-icon" class="platform-icon" src="/static/images/logo.png" alt="Platform">
        </div>

        <!-- Text -->
        <h1 class="redirect-title">Redirecting to <span id="platform-name" class="platform-name">Streaming
                Partner</span></h1>
        <p class="redirect-subtitle">
            Taking you to watch <span id="movie-title" class="movie-name">your content</span>
        </p>

        <!-- Loading -->
        <div class="loading-section">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <p class="progress-text">Connecting to streaming service...</p>
        </div>

        <!-- Notice -->
        <div class="notice-box">
            <i class='bx bx-info-circle'></i>
            <p>You will be redirected to the official streaming platform. A valid subscription may be required to watch
                this content.</p>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
            <a href="javascript:history.back()" class="btn-back">
                <i class='bx bx-arrow-back'></i>
                Go Back
            </a>
            <a href="/home.html" class="btn-home">
                <i class='bx bx-home'></i>
                Home
            </a>
        </div>
    </div>

    <script>
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const platform = params.get('platform') || 'Streaming Partner';
        const title = params.get('title') || 'Your Content';
        const icon = params.get('icon') || '';

        // Populate card
        document.getElementById('platform-name').textContent = platform;
        document.getElementById('movie-title').textContent = title;
        document.title = `Redirecting to ${platform} | Entertainment Hub`;

        if (icon) {
            document.getElementById('platform-icon').src = `/images/watch/${icon}.png`;
            document.getElementById('platform-icon').onerror = function () {
                this.src = '/images/logo.png';
            };
        }

        // Streaming platform URLs
        const platformUrls = {
            'netflix': 'https://www.netflix.com',
            'amazonprime': 'https://www.primevideo.com',
            'disney+': 'https://www.disneyplus.com',
            'hotstar': 'https://www.hotstar.com',
            'hulu': 'https://www.hulu.com',
            'max': 'https://www.max.com',
            'crunchyroll': 'https://www.crunchyroll.com',
            'funimation': 'https://www.funimation.com',
            'appletv': 'https://tv.apple.com',
            'youtube': 'https://www.youtube.com',
            'jiocinema': 'https://www.jiocinema.com',
            'playstore': 'https://play.google.com/store/movies'
        };

        // Generate floating particles
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 6 + 3;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 8 + 6) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            particleContainer.appendChild(p);
        }

        // Update progress text over time
        const progressText = document.querySelector('.progress-text');
        setTimeout(() => { progressText.textContent = 'Establishing connection...'; }, 1500);
        setTimeout(() => { progressText.textContent = 'Almost there...'; }, 3000);
        setTimeout(() => {
            progressText.textContent = 'Ready!';
            progressText.style.color = '#FFB43A';
        }, 3800);
    </script>
</body>

</html>
