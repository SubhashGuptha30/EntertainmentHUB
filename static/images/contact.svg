<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb43a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Elements -->
  <circle cx="250" cy="250" r="200" fill="url(#grad1)" opacity="0.1" />
  <circle cx="250" cy="250" r="150" fill="url(#grad1)" opacity="0.2" />
  
  <!-- Main Icon: Envelope/Message -->
  <g transform="translate(100, 100) scale(0.6)" filter="url(#glow)">
    <path d="M40 80H460C482.091 80 500 97.9086 500 120V380C500 402.091 482.091 420 460 420H40C17.9086 420 0 402.091 0 380V120C0 97.9086 17.9086 80 40 80Z" fill="#111" stroke="url(#grad1)" stroke-width="20"/>
    <path d="M40 100L250 260L460 100" stroke="url(#grad1)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="250" cy="260" r="30" fill="url(#grad1)" />
  </g>
  
  <!-- Decorative Particles -->
  <circle cx="100" cy="100" r="10" fill="#ffb43a" opacity="0.8">
    <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="400" r="15" fill="#ff4757" opacity="0.8">
    <animate attributeName="cy" values="400;410;400" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="420" cy="80" r="8" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
